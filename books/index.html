<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETYA Kitap Okuyucu</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --container-bg: #ffffff;
            --accent-color: #0984e3;
        }

        body.dark-mode {
            --bg-color: #2d3436;
            --text-color: #dfe6e9;
            --container-bg: #1e272e;
            --accent-color: #74b9ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Üst Menü */
        .toolbar {
            position: sticky;
            top: 0;
            width: 100%;
            background: var(--container-bg);
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border: 1px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover { background: var(--accent-color); color: white; }

        /* Kitap Alanı */
        #viewer {
            max-width: 800px;
            width: 90%;
            margin: 40px 0;
            background: var(--container-bg);
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 100vh;
            white-space: pre-wrap; /* Satırları korur */
            font-size: 18px;
            line-height: 1.8;
            word-wrap: break-word;
        }

        h1 { color: var(--accent-color); text-align: center; }
        .error { color: #d63031; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="toggleDarkMode()">Gece Modu</button>
        <button onclick="changeFontSize(2)">Yazıyı Büyüt +</button>
        <button onclick="changeFontSize(-2)">Yazıyı Küçült -</button>
        <button onclick="location.href='../'">Geri Dön</button>
    </div>

    <div id="viewer">Kitap dosyası yükleniyor...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');
        const viewer = document.getElementById('viewer');

        // 1. Dosyayı Çekme İşlemi (URL düzeltildi)
        if (bookId) {
            // "datasandfiles" klasöründeki dosyayı çağırır
            fetch(`../datasandfiles/${bookId}.txt`)
                .then(res => {
                    if (!res.ok) throw new Error("Dosya bulunamadı.");
                    return res.text();
                })
                .then(data => {
                    viewer.innerText = data;
                    document.title = bookId.toUpperCase() + " | Okuyucu";
                })
                .catch(err => {
                    viewer.innerHTML = `<div class="error"><h1>Hata!</h1><p>${bookId}.txt dosyası datasandfiles klasöründe bulunamadı.</p></div>`;
                });
        }

        // 2. Fonksiyonlar
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function changeFontSize(step) {
            const currentSize = parseFloat(window.getComputedStyle(viewer).fontSize);
            viewer.style.fontSize = (currentSize + step) + "px";
        }
    </script>
</body>
</html>
