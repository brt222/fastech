<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asayiş 26</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;1,400&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px 80px;
    font-family: 'Crimson Pro', Georgia, serif;
  }

  .scene { perspective: 1200px; }

  .book {
    width: 540px;
    transform-style: preserve-3d;
    transform: rotateY(-22deg);
    transition: transform 0.5s ease;
    filter: drop-shadow(30px 30px 60px rgba(0,0,0,0.9));
  }

  .book:hover { transform: rotateY(-8deg); }

  .cover-front {
    width: 100%;
    background: #111;
    position: relative;
    padding: 50px 44px 36px;
    box-shadow:
      5px 0 0 #0e0e0e,
      10px 0 0 #0b0b0b,
      15px 0 0 #090909,
      20px 0 0 #070707;
  }

  .cover-front::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 7px;
    background: #8b1a1a;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: 58px;
    font-weight: 900;
    color: #f0e8d8;
    line-height: 0.88;
    letter-spacing: -1px;
  }

  .cover-rule {
    height: 1px;
    background: linear-gradient(90deg, #8b1a1a 0%, transparent 80%);
    margin: 18px 0 12px;
  }

  .cover-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 14px;
    color: #8b1a1a;
    letter-spacing: 0.5px;
  }

  .book-pages {
    width: 100%;
    background: #f0e8d8;
    position: relative;
    box-shadow:
      5px 0 0 #e2d8c4,
      10px 0 0 #d4cbb6,
      15px 0 0 #c8bfaa;
  }

  .book-pages::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 16px;
    background: linear-gradient(90deg, #bdb09a, #e8dcc8);
    z-index: 1;
    pointer-events: none;
  }

  .page-content {
    position: relative;
    z-index: 2;
    padding: 38px 44px 50px 58px;
    color: #1a1008;
    font-size: 14px;
    line-height: 1.78;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .loading {
    position: relative;
    z-index: 2;
    padding: 40px 44px 40px 58px;
    color: #6b4f35;
    font-style: italic;
    font-size: 14px;
  }

  .cover-back {
    width: 100%;
    height: 18px;
    background: #0e0e0e;
    box-shadow: 5px 0 0 #0a0a0a, 10px 0 0 #080808;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="book">
    <div class="cover-front">
      <div class="cover-title">Asayiş<br>26</div>
      <div class="cover-rule"></div>
      <div class="cover-sub">Strateji ve Bilim · Bölüm I</div>
    </div>
    <div class="book-pages">
      <div class="loading" id="loading">Yükleniyor...</div>
      <div class="page-content" id="content" style="display:none;"></div>
    </div>
    <div class="cover-back"></div>
  </div>
</div>
<script>
  fetch('https://fasth.tech/datasandfiles/asayis26.txt')
    .then(r => r.text())
    .then(text => {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('content');
      el.style.display = 'block';
      el.textContent = text;
    })
    .catch(() => {
      document.getElementById('loading').textContent = 'Metin yüklenemedi.';
    });
</script>
</body>
</html>
