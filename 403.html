<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erişim Engellendi | 403</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #00ff88; /* Neon Yeşil */
            --secondary-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(45deg, var(--accent-color), #00bcff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        .maintenance-badge {
            background: var(--secondary-color);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Mobil uyum */
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .container { width: 85%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">403</div>
        <div class="maintenance-badge">Sistem Kapalı</div>
        <h1>ERİŞİM ENGELLENDİ</h1>
        <p>
            Sitemiz şuan yeni özellikler eklenmesi adına durdurulmuştur.
            Şuana kadar siteye giriş yapamazsınız.
            Beklemeniz önerilir.
        </p>
        <div>
            <span class="status-dot"></span>
            <small style="color: var(--accent-color);">Geliştirme Devam Ediyor...</small>
        </div>
    </div>

</body>
</html>
