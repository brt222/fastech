<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastech Support | İletişim</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background: radial-gradient(circle at bottom left, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .support-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2rem; margin-bottom: 0.5rem; color: var(--primary); }
        p.subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #94a3b8; }

        input, select, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-send {
            width: 100%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2); }

        #response-msg {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            text-align: center;
            font-size: 0.9rem;
        }

        .success { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        
        .mail-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.8rem;
            display: block;
            text-align: center;
            margin-top: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="support-card">
        <h2>Bize Ulaşın</h2>
        <p class="subtitle">Sorularınız için communication@fasth.tech adresine yazabilir veya formu doldurabilirsiniz.</p>

        <form id="contactForm" action="https://formspree.io/f/communication@fasth.tech" method="POST">
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" name="name" required placeholder="Adınız">
            </div>

            <div class="form-group">
                <label>E-posta</label>
                <input type="email" name="_replyto" required placeholder="E-posta adresiniz">
            </div>

            <div class="form-group">
                <label>Konu</label>
                <select name="subject">
                    <option value="Teknik Destek">Teknik Destek</option>
                    <option value="Hata Bildirimi">Hata Bildirimi (Bug)</option>
                    <option value="Öneri">Öneri</option>
                    <option value="Diğer">Diğer</option>
                </select>
            </div>

            <div class="form-group">
                <label>Mesaj</label>
                <textarea name="message" rows="4" required placeholder="Nasıl yardımcı olabiliriz?"></textarea>
            </div>

            <button type="submit" class="btn-send">Mesajı Gönder</button>
        </form>

        <a href="mailto:communication@fasth.tech" class="mail-link">Doğrudan e-posta gönder: communication@fasth.tech</a>
        
        <div id="response-msg">Mesajınız başarıyla iletildi!</div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const resMsg = document.getElementById('response-msg');

        form.onsubmit = function(e) {
            // Not: Formspree kullanıyorsan bu basit script ile sayfayı yenilemeden
            // başarı mesajı gösterebilirsin.
            resMsg.style.display = 'block';
            resMsg.className = 'success';
            // form.reset(); // İsteğe bağlı
        };
    </script>
</body>
</html>
